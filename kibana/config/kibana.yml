# Kibana Configuration
# This file contains settings to enable Agent Builder and other features

# Server settings
server.host: "0.0.0.0"
server.shutdownTimeout: "5s"

# Elasticsearch connection
elasticsearch.hosts: ["http://elasticsearch:9200"]

# Encryption keys for saved objects and connectors
# These keys are required for connectors, actions, and encrypted saved objects to work
# Generate new keys with: openssl rand -hex 32
xpack.encryptedSavedObjects.encryptionKey: "ff13f4fc16a1e6526e463f5e8deb668e43c4e4097eebc795d6c3e64f3d58f4ce"
xpack.reporting.encryptionKey: "e1f28e4a25c204f213de64b2761662774e11bf2666798e5d6ca10cccc0f0c9df"

# Note: Security is configured via environment variables in docker-compose.yml
# Note: Agent Builder is enabled via Advanced Settings API, not directly in kibana.yml
# See scripts/enable-agent-builder.sh for enabling it programmatically
# Or enable it via Kibana UI: Global Search → "Agent Builder" → Toggle ON
