
events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    # HTTP Server on Port 8000 -> Redirect to HTTPS 8443
    server {
        listen 8000;
        server_name localhost 127.0.0.1;
        
        location / {
            return 301 https://$host:8443$request_uri;
        }
    }

    # HTTPS Server on Port 8443 -> Proxy to Django on 8001
    server {
        listen 8443 ssl;
        server_name localhost 127.0.0.1;

        ssl_certificate /Users/grabowskit/dev/pathfinder/nginx/certs/localhost.pem;
        ssl_certificate_key /Users/grabowskit/dev/pathfinder/nginx/certs/localhost-key.pem;

        location / {
            proxy_pass http://127.0.0.1:8001;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            
            # Disable buffering for SSE
            proxy_buffering off;
            proxy_cache off;
            
            # Increase timeouts for long AI responses
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 300s;
        }
    }
}
