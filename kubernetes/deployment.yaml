---
# BackendConfig for GCE Load Balancer - extends timeout for SSE streams
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: codepathfinder-backend-config
  namespace: codepathfinder
spec:
  timeoutSec: 300  # 5 minutes for SSE streams
  connectionDraining:
    drainingTimeoutSec: 60
---
# Service with BackendConfig annotation for extended timeout
apiVersion: v1
kind: Service
metadata:
  name: codepathfinder-service
  namespace: codepathfinder
  labels:
    app: codepathfinder
  annotations:
    cloud.google.com/backend-config: '{"default": "codepathfinder-backend-config"}'
spec:
  type: NodePort
  selector:
    app: codepathfinder
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: codepathfinder
  namespace: codepathfinder
  labels:
    app: codepathfinder
spec:
  replicas: 2
  selector:
    matchLabels:
      app: codepathfinder
  template:
    metadata:
      labels:
        app: codepathfinder
    spec:
      serviceAccountName: codepathfinder-ksa
      imagePullSecrets:
      - name: artifact-registry-key
      containers:
      - name: web
        image: us-central1-docker.pkg.dev/wired-sound-479919-k8/codepathfinder/web:v1.7.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: DJANGO_ENV
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: codepathfinder-secrets
              key: DATABASE_URL
        - name: DJANGO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: codepathfinder-secrets
              key: DJANGO_SECRET_KEY
        - name: ELASTICSEARCH_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: codepathfinder-secrets
              key: ELASTICSEARCH_ENDPOINT
        - name: ELASTICSEARCH_API_KEY
          valueFrom:
            secretKeyRef:
              name: codepathfinder-secrets
              key: ELASTICSEARCH_API_KEY
        - name: CPF_INTERNAL_SERVICE_SECRET
          valueFrom:
            secretKeyRef:
              name: codepathfinder-secrets
              key: CPF_INTERNAL_SERVICE_SECRET
        - name: LIBRECHAT_EXTERNAL_URL
          valueFrom:
            secretKeyRef:
              name: codepathfinder-secrets
              key: LIBRECHAT_EXTERNAL_URL
        - name: OIDC_RSA_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: codepathfinder-secrets
              key: OIDC_RSA_PRIVATE_KEY
        - name: OIDC_ISS_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: codepathfinder-secrets
              key: OIDC_ISS_ENDPOINT
        # Internal OTel instrumentation — sends directly to in-cluster collector
        - name: OTEL_ENABLED
          value: "true"
        - name: OTEL_SERVICE_NAME
          value: "codepathfinder-web"
        - name: OTEL_COLLECTOR_ENDPOINT
          value: "http://otel-collector-service.codepathfinder.svc.cluster.local:4318"
        - name: CPF_PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: codepathfinder-secrets
              key: CPF_INTERNAL_PROJECT_ID
        # LLM credentials for embedded Ask CodePathfinder chat panel
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: librechat-secrets
              key: OPENAI_API_KEY
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: librechat-secrets
              key: BEDROCK_AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: librechat-secrets
              key: BEDROCK_AWS_SECRET_ACCESS_KEY
        - name: AWS_DEFAULT_REGION
          value: "us-east-2"
        volumeMounts:
        - name: librechat-config
          mountPath: /app/librechat.yaml
          subPath: librechat.yaml
          readOnly: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health/
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
      
      # Cloud SQL Proxy sidecar (v2 with Workload Identity support)
      - name: cloud-sql-proxy
        image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.8.0
        args:
          - "--port=5432"
          - "<YOUR_GCP_PROJECT>:<YOUR_REGION>:<YOUR_CLOUD_SQL_INSTANCE>"
        securityContext:
          runAsNonRoot: true
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
      volumes:
      - name: librechat-config
        configMap:
          name: librechat-config
