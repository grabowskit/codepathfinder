---
apiVersion: v1
kind: ConfigMap
metadata:
  name: librechat-config
  namespace: codepathfinder
data:
  librechat.yaml: |
    version: 1.2.1
    cache: true

    interface:
      endpointsMenu: false
      modelSelect: true

    mcpSettings:
      allowedDomains:
        - "codepathfinder-service.codepathfinder.svc.cluster.local"

    mcpServers:
      codepathfinder:
        type: streamable-http
        url: "http://codepathfinder-service.codepathfinder.svc.cluster.local/mcp/"
        title: "CodePathfinder"
        description: "Semantic code search, GitHub operations, skills, and job management"
        headers:
          Authorization: "Bearer ${CPF_INTERNAL_SERVICE_SECRET}"
          X-User-Email: "{{LIBRECHAT_USER_EMAIL}}"
        timeout: 60000
        initTimeout: 15000
        startup: false

    endpoints:
      bedrock:
        availableRegions:
          - "us-east-2"
        streamRate: 35
        titleModel: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
        models:
          - "us.anthropic.claude-sonnet-4-6"
          - "us.anthropic.claude-opus-4-6-v1"
          - "us.anthropic.claude-haiku-4-5-20251001-v1:0"

    modelSpecs:
      enforce: true
      prioritize: true
      list:
        - name: "bedrock-claude-sonnet-4-6"
          label: "Claude Sonnet 4.6"
          description: "Anthropic Claude Sonnet 4.6 via AWS Bedrock with CodePathfinder tools"
          default: true
          showIconInMenu: true
          iconURL: "https://docs.anthropic.com/images/claude-logo-icon.svg"
          mcpServers:
            - "codepathfinder"
          preset:
            endpoint: "bedrock"
            model: "us.anthropic.claude-sonnet-4-6"
            mcpServers:
              - "codepathfinder"
            promptPrefix: |
              You have access to CodePathfinder MCP tools for code search, GitHub operations, user memory, and reusable skills.

              **When to use MCP tools (check these FIRST):**
              - GitHub or codebase questions → search_code, get_file_content, list_repo_files, github_*
              - User memory, preferences, or saved context → memories_search, memories_get, memories_list
              - Reusable workflows, procedures, or skills → skills_search, skills_get, skills_list
              - Prior conversations or decisions → memories_search with relevant tags
              - Job status or project metadata → projects_*, jobs_*

              **Tool priority policy:**
              When a request may involve GitHub, codebases, user memory, saved preferences, reusable skills, or prior context, check the CodePathfinder MCP tools first. Treat that server as the authoritative source for those categories. Only answer without tools if they are unavailable or return nothing relevant.

              If tools fail or return no results, explain what you checked before falling back to general knowledge.
        - name: "bedrock-claude-opus-4-6"
          label: "Claude Opus 4.6"
          description: "Anthropic Claude Opus 4.6 via AWS Bedrock with CodePathfinder tools"
          showIconInMenu: true
          iconURL: "https://docs.anthropic.com/images/claude-logo-icon.svg"
          mcpServers:
            - "codepathfinder"
          preset:
            endpoint: "bedrock"
            model: "us.anthropic.claude-opus-4-6-v1"
            mcpServers:
              - "codepathfinder"
            promptPrefix: |
              You have access to CodePathfinder MCP tools for code search, GitHub operations, user memory, and reusable skills.

              **When to use MCP tools (check these FIRST):**
              - GitHub or codebase questions → search_code, get_file_content, list_repo_files, github_*
              - User memory, preferences, or saved context → memories_search, memories_get, memories_list
              - Reusable workflows, procedures, or skills → skills_search, skills_get, skills_list
              - Prior conversations or decisions → memories_search with relevant tags
              - Job status or project metadata → projects_*, jobs_*

              **Tool priority policy:**
              When a request may involve GitHub, codebases, user memory, saved preferences, reusable skills, or prior context, check the CodePathfinder MCP tools first. Treat that server as the authoritative source for those categories. Only answer without tools if they are unavailable or return nothing relevant.

              If tools fail or return no results, explain what you checked before falling back to general knowledge.
        - name: "bedrock-claude-haiku-4-5"
          label: "Claude Haiku 4.5"
          description: "Anthropic Claude Haiku 4.5 via AWS Bedrock with CodePathfinder tools"
          showIconInMenu: true
          iconURL: "https://docs.anthropic.com/images/claude-logo-icon.svg"
          mcpServers:
            - "codepathfinder"
          preset:
            endpoint: "bedrock"
            model: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
            mcpServers:
              - "codepathfinder"
            promptPrefix: |
              You have access to CodePathfinder MCP tools for code search, GitHub operations, user memory, and reusable skills.

              **When to use MCP tools (check these FIRST):**
              - GitHub or codebase questions → search_code, get_file_content, list_repo_files, github_*
              - User memory, preferences, or saved context → memories_search, memories_get, memories_list
              - Reusable workflows, procedures, or skills → skills_search, skills_get, skills_list
              - Prior conversations or decisions → memories_search with relevant tags
              - Job status or project metadata → projects_*, jobs_*

              **Tool priority policy:**
              When a request may involve GitHub, codebases, user memory, saved preferences, reusable skills, or prior context, check the CodePathfinder MCP tools first. Treat that server as the authoritative source for those categories. Only answer without tools if they are unavailable or return nothing relevant.

              If tools fail or return no results, explain what you checked before falling back to general knowledge.
