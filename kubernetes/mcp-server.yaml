apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: codepathfinder
  labels:
    app: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      containers:
      - name: mcp-server
        image: <YOUR_REGISTRY>/codepathfinder/mcp-server:latest # Update tag as needed
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
          name: http
        env:
        - name: ELASTICSEARCH_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: codepathfinder-secrets
              key: ELASTICSEARCH_ENDPOINT
        - name: ELASTICSEARCH_API_KEY
          valueFrom:
            secretKeyRef:
              name: codepathfinder-secrets
              key: ELASTICSEARCH_API_KEY
        - name: DJANGO_INTROSPECT_URL
          value: "http://codepathfinder-service.codepathfinder.svc.cluster.local:80/o/introspect/" # Internal service URL
        - name: OAUTH_CLIENT_ID
          valueFrom:
             secretKeyRef:
               name: codepathfinder-secrets
               key: OAUTH_CLIENT_ID
        - name: OAUTH_CLIENT_SECRET
          valueFrom:
             secretKeyRef:
               name: codepathfinder-secrets
               key: OAUTH_CLIENT_SECRET
        - name: PORT
          value: "3001"
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-server-service
  namespace: codepathfinder
  labels:
    app: mcp-server
spec:
  type: NodePort
  selector:
    app: mcp-server
  ports:
  - port: 80
    targetPort: 3001
    protocol: TCP
    name: http
---
# Ingress update required to expose this service externally
# Currently assuming usage as a separate host mcp.codepathfinder.com or path /mcp (but main web uses /)
# Example Ingress Rule addition:
# - host: mcp.codepathfinder.com
#   http:
#     paths:
#     - path: /
#       pathType: Prefix
#       backend:
#         service:
#           name: mcp-server-service
#           port:
#             number: 80
