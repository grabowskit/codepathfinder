{% extends "base.html" %}
{% load i18n %}

{% block auth_content %}
<div class="auth-container">
    <div class="auth-header">
        <h1>{% trans "Sign In" %}</h1>
        <p style="color: var(--text-secondary);">{% blocktrans with provider.name as provider %}You are about to sign in
            using a third-party account from {{ provider }}.{% endblocktrans %}</p>
    </div>

    <div class="card">
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-primary" style="width: 100%;">{% trans "Continue" %}</button>
        </form>
    </div>
</div>
{% endblock %}
